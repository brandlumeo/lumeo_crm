upstream django_backend {
    server backend:8000;
    keepalive 32;
}

upstream nextjs_frontend {
    server frontend:3000;
    keepalive 32;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name _;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name _;

    # ── TLS ─────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Security headers ────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff always;
    add_header X-Frame-Options           SAMEORIGIN always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Request limits ──────────────────────────────────────────────────────
    client_max_body_size 20M;

    # ── Django API ──────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://django_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout    120s;
    }

    # ── Django Admin ────────────────────────────────────────────────────────
    location /admin/ {
        proxy_pass         http://django_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Django static files (served by WhiteNoise via Gunicorn) ─────────────
    location /static/ {
        proxy_pass       http://django_backend;
        proxy_set_header Host $host;
        expires          365d;
        add_header       Cache-Control "public, immutable";
    }

    # ── Django user-uploaded media ──────────────────────────────────────────
    location /media/ {
        alias /media/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # ── Celery Flower dashboard (restrict to internal/admin IPs) ────────────
    location /flower/ {
        # Uncomment and configure to restrict access:
        # allow 10.0.0.0/8;
        # deny all;
        proxy_pass         http://flower:5555;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        rewrite ^/flower/(.*)$ /$1 break;
    }

    # ── Next.js frontend (everything else) ──────────────────────────────────
    location / {
        proxy_pass         http://nextjs_frontend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # ── Next.js static assets — cache aggressively ──────────────────────────
    location /_next/static/ {
        proxy_pass       http://nextjs_frontend;
        expires          365d;
        add_header       Cache-Control "public, immutable";
    }
}
