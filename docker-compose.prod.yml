# ─────────────────────────────────────────────────────────────────────────────
# Lumeo CRM — Production Compose
# Fully containerised: Nginx TLS termination, Gunicorn, Next.js standalone,
# Celery worker + beat, PostgreSQL, Redis, Flower monitoring.
#
# Usage:
#   1. Copy .env.example → .env and fill in all values
#   2. Place your TLS certs in ./nginx/ssl/fullchain.pem and privkey.pem
#   3. docker compose -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD:-lumeo_redis_change_me}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - internal

  # ── Django (Gunicorn) ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      target: runtime
    restart: always
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application
             --bind 0.0.0.0:8000
             --workers ${GUNICORN_WORKERS:-4}
             --threads ${GUNICORN_THREADS:-2}
             --timeout 120
             --log-level info
             --access-logfile -
             --error-logfile -"
    env_file:
      - .env
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - static_files:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # ── Celery Worker ──────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      target: runtime
    restart: always
    command: celery -A config worker --loglevel=info --concurrency=4
    env_file:
      - .env
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - backend
    networks:
      - internal

  # ── Celery Beat (Scheduler) ────────────────────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      target: runtime
    restart: always
    command: celery -A config beat --loglevel=info
    env_file:
      - .env
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/1
    depends_on:
      - celery-worker
    networks:
      - internal

  # ── Flower (Celery Monitoring) ──────────────────────────────────────────────
  flower:
    build:
      context: ./backend
      target: runtime
    restart: unless-stopped
    command: >
      celery -A config flower
      --port=5555
      --url_prefix=flower
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
    depends_on:
      - redis
    networks:
      - internal

  # ── Next.js Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      target: runtime
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://yourdomain.com/api/v1}
    restart: always
    environment:
      NODE_ENV: production
      PORT: "3000"
    depends_on:
      - backend
    networks:
      - internal

  # ── Nginx (TLS termination + reverse proxy) ────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - static_files:/static:ro             # Serve Django static files
    depends_on:
      - backend
      - frontend
    networks:
      - internal
      - external

networks:
  internal:
    driver: bridge
    internal: true              # No direct internet access for internal services
  external:
    driver: bridge              # Only Nginx is on the external network

volumes:
  postgres_data:
  redis_data:
  static_files:
